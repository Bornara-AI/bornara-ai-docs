name: Copilot Documentation Assistant

on:
  pull_request:
    paths:
      - "docs/**/*.md"
      - "scripts/**"
      - ".github/workflows/**"
      - "package.json"
      - ".markdownlint.json"
      - ".prettierrc.json"
      - "docs/05_Projects/*/project.json"

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze-changes:
    name: Analyze Documentation Changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get changed files
        id: changed-files
        # Pinned to SHA of v44 — prevents supply-chain compromise (tj-actions incident, Mar 2025)
        # To update: check https://github.com/tj-actions/changed-files/releases and update SHA
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323
        with:
          files: |
            docs/**/*.md
            scripts/**
            .github/workflows/**
            package.json
            .markdownlint.json
            .prettierrc.json
            docs/05_Projects/*/project.json

      - name: Check if README needs update
        if: steps.changed-files.outputs.any_changed == 'true'
        id: readme-check
        run: |
          echo "Changed files: ${{ steps.changed-files.outputs.all_changed_files }}"

          # Check if README.md is in changed files
          if echo "${{ steps.changed-files.outputs.all_changed_files }}" | grep -q "README.md"; then
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "✅ README.md already updated in this PR"
          else
            # Check if any trigger files changed
            needs_update=false
            for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
              case $file in
                package.json|.github/workflows/*|scripts/*|.markdownlint.json|.prettierrc.json)
                  needs_update=true
                  break
                  ;;
              esac
            done
            echo "needs_update=$needs_update" >> $GITHUB_OUTPUT
            if [ "$needs_update" = "true" ]; then
              echo "⚠️ README may need updating"
            fi
          fi

      - name: Check for new projects
        id: new-projects
        run: |
          new_projects=$(git diff --name-only origin/main...HEAD | grep "docs/05_Projects/" | cut -d/ -f3 | sort -u || echo "")
          if [ -n "$new_projects" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "projects=$new_projects" >> $GITHUB_OUTPUT
            echo "📁 New or modified projects detected"
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR with suggestions
        if:
          steps.readme-check.outputs.needs_update == 'true' || steps.new-projects.outputs.found ==
          'true'
        uses: actions/github-script@v7
        with:
          script: |
            const suggestions = [];

            if ('${{ steps.readme-check.outputs.needs_update }}' === 'true') {
              suggestions.push('📝 **README Update Recommended**\n   Configuration or tooling files changed. Consider updating README.md to reflect these changes.');
            }

            if ('${{ steps.new-projects.outputs.found }}' === 'true') {
              suggestions.push('📁 **Project Changes Detected**\n   New or modified projects found. Run `npm run registry:update` to update the project registry.');
            }

            if (suggestions.length > 0) {
              const body = `## 🤖 Documentation Assistant\n\n${suggestions.join('\n\n')}\n\n💡 **Tip:** You can ask GitHub Copilot for help:\n- \`@doc-updater help me update documentation\`\n- \`@standards-check review this doc\`\n- \`@cross-ref check links\``;
              
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
